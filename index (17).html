<html lang="en">
<head>

<meta name="description" content="Watch IPL 2026 live streaming free on CrickCast">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-39PQBS0XB2');</script>
<style>
:root{
  --gold:#f5c518;--gold-glow:rgba(245,197,24,0.35);
  --navy:#04091a;--blue:#1740a8;--blue-lit:#2563eb;
  --red:#c0392b;--white:#f0f6ff;--muted:#8099c4;
  --border:rgba(255,255,255,0.07);--card:rgba(255,255,255,0.04);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100vh;font-family:'Rajdhani',sans-serif;color:var(--white);background:var(--navy);overflow-x:hidden;}

.seam-bar{position:fixed;top:0;left:0;right:0;height:3px;z-index:200;background:linear-gradient(90deg,transparent,var(--red) 15%,var(--gold) 40%,#fff 50%,var(--gold) 60%,var(--red) 85%,transparent);}
.ipl-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.ipl-bg::before{content:'';position:absolute;inset:0;background:
  radial-gradient(ellipse 90% 55% at 50% -5%,rgba(23,64,168,0.5) 0%,transparent 65%),
  radial-gradient(ellipse 55% 45% at 5% 70%,rgba(192,57,43,0.14) 0%,transparent 55%),
  radial-gradient(ellipse 55% 45% at 95% 70%,rgba(245,197,24,0.1) 0%,transparent 55%);}
.beam{position:absolute;bottom:0;transform-origin:bottom center;filter:blur(7px);animation:beamSway 8s ease-in-out infinite;}
.beam:nth-child(1){left:6%;width:55px;height:72vh;background:linear-gradient(0deg,transparent,rgba(245,197,24,0.11),rgba(255,255,255,0.06));}
.beam:nth-child(2){left:20%;width:40px;height:80vh;background:linear-gradient(0deg,transparent,rgba(37,99,235,0.12),transparent);animation-delay:-2.5s;opacity:.7;}
.beam:nth-child(3){right:8%;width:52px;height:74vh;background:linear-gradient(0deg,transparent,rgba(245,197,24,0.10),rgba(255,255,255,0.05));animation-delay:-4.5s;}
.beam:nth-child(4){right:22%;width:38px;height:78vh;background:linear-gradient(0deg,transparent,rgba(37,99,235,0.11),transparent);animation-delay:-7s;opacity:.8;}
@keyframes beamSway{0%,100%{transform:rotate(-3deg);}50%{transform:rotate(3deg);}}
.pitch{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:200px;height:300px;
  background:repeating-linear-gradient(0deg,transparent,transparent 17px,rgba(245,197,24,0.04) 17px,rgba(245,197,24,0.04) 19px);
  clip-path:polygon(28% 0%,72% 0%,100% 100%,0% 100%);}
.particles{position:absolute;inset:0;}
.p{position:absolute;border-radius:50%;animation:floatUp linear infinite;pointer-events:none;}
@keyframes floatUp{0%{transform:translateY(105vh) rotate(0deg);opacity:0;}10%{opacity:1;}90%{opacity:1;}100%{transform:translateY(-8vh) rotate(720deg);opacity:0;}}
.noise{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px;}

/* HEADER */
.header{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:58px;background:rgba(4,9,26,0.9);backdrop-filter:blur(18px);border-bottom:1px solid rgba(245,197,24,0.18);}
.logo{display:flex;align-items:center;gap:9px;}
.logo-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--gold),#e8920e);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 0 18px var(--gold-glow);flex-shrink:0;}
.logo-name{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:2px;background:linear-gradient(90deg,#fff 40%,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo-tag{font-size:9px;font-family:'DM Sans',sans-serif;color:var(--gold);letter-spacing:3px;font-weight:500;text-transform:uppercase;line-height:1;margin-top:1px;}
.live-badge{display:flex;align-items:center;gap:6px;background:rgba(192,57,43,0.2);border:1px solid rgba(239,68,68,0.5);padding:5px 12px;border-radius:30px;font-size:11px;font-weight:700;letter-spacing:2px;color:#fca5a5;animation:livePulse 2s ease-in-out infinite;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#ef4444;box-shadow:0 0 8px #ef4444;animation:blink 1.1s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes livePulse{0%,100%{opacity:1}50%{opacity:.75}}

.container{position:relative;z-index:5;max-width:480px;margin:0 auto;padding:14px 14px 32px;display:flex;flex-direction:column;gap:13px;}

/* MATCH CARD — NO LOGOS, TEXT ONLY */
.match-card{
  background:linear-gradient(135deg,rgba(23,64,168,0.28),rgba(7,17,43,0.82));
  border:1px solid rgba(245,197,24,0.22);
  border-radius:18px;padding:20px 18px 16px;
  position:relative;overflow:hidden;
  animation:riseIn .4s ease both;
}
.match-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold) 40%,var(--red) 60%,transparent);}
.ipl-label{text-align:center;font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:4px;color:rgba(245,197,24,0.4);margin-bottom:14px;}
.match-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.team-block{flex:1;display:flex;flex-direction:column;gap:4px;}
.team-block:last-child{align-items:flex-end;text-align:right;}
.team-abbr{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:3px;line-height:1;background:linear-gradient(135deg,#fff,rgba(255,255,255,0.8));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.team-full{font-size:10px;font-family:'DM Sans',sans-serif;color:var(--muted);letter-spacing:.3px;line-height:1.3;}
.vs-block{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;padding:0 8px;}
.vs-line{width:1px;height:22px;background:linear-gradient(180deg,transparent,rgba(245,197,24,0.4),transparent);}
.vs-text{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:3px;color:var(--muted);}
.match-status{font-size:9px;font-family:'DM Sans',sans-serif;color:var(--gold);letter-spacing:2px;font-weight:600;text-transform:uppercase;}
.match-venue{text-align:center;font-size:10px;font-family:'DM Sans',sans-serif;color:var(--muted);margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.06);letter-spacing:.3px;}

/* PLAYER */
.player-wrap{position:relative;border-radius:16px;overflow:hidden;background:#000;
  box-shadow:0 0 0 1px rgba(245,197,24,0.2),0 12px 48px rgba(0,0,0,0.7),0 0 80px rgba(23,64,168,0.18);
  animation:riseIn .45s ease both;}
.player-wrap iframe{display:block;width:100%;height:218px;border:none;}
.click-overlay{position:absolute;inset:0;z-index:5;cursor:pointer;background:transparent;}
.cb{position:absolute;width:14px;height:14px;z-index:6;}
.cb-tl{top:8px;left:8px;border-top:2px solid var(--gold);border-left:2px solid var(--gold);border-radius:2px 0 0;}
.cb-tr{top:8px;right:8px;border-top:2px solid var(--gold);border-right:2px solid var(--gold);border-radius:0 2px 0;}
.cb-bl{bottom:8px;left:8px;border-bottom:2px solid var(--gold);border-left:2px solid var(--gold);border-radius:0 0 0 2px;}
.cb-br{bottom:8px;right:8px;border-bottom:2px solid var(--gold);border-right:2px solid var(--gold);border-radius:0 0 2px;}

/* CHANNEL DROPDOWN */
.channel-panel{border-radius:16px;overflow:hidden;border:1px solid var(--border);background:var(--card);backdrop-filter:blur(12px);animation:riseIn .5s ease both;}
.channel-header{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;background:rgba(255,255,255,0.03);border-bottom:1px solid transparent;transition:background .2s;user-select:none;}
.channel-header:hover{background:rgba(255,255,255,0.06);}
.channel-header.open{border-bottom-color:var(--border);}
.ch-left{display:flex;align-items:center;gap:10px;}
.ch-pulsedot{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold-glow);animation:blink 2s ease-in-out infinite;}
.ch-label{font-size:14px;font-weight:700;letter-spacing:.5px;}
.ch-current{font-size:11px;font-family:'DM Sans',sans-serif;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.ch-arrow{font-size:11px;color:var(--muted);transition:transform .3s;flex-shrink:0;}
.ch-arrow.open{transform:rotate(180deg);}
.dropdown-body{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1);}
.dropdown-body.open{max-height:500px;}
.ch-option{display:flex;align-items:center;gap:13px;padding:13px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .18s;position:relative;}
.ch-option:last-child{border-bottom:none;}
.ch-option:hover{background:rgba(37,99,235,0.12);}
.ch-option.active{background:rgba(245,197,24,0.06);}
.ch-option.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--gold),var(--red));border-radius:0 2px 2px 0;}
.ch-num{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:'Bebas Neue',sans-serif;flex-shrink:0;}
.ch-info{flex:1;min-width:0;}
.ch-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ch-desc{font-size:11px;font-family:'DM Sans',sans-serif;color:var(--muted);}
.ch-tag{font-size:9px;font-weight:700;letter-spacing:1.5px;padding:3px 7px;border-radius:6px;font-family:'DM Sans',sans-serif;white-space:nowrap;flex-shrink:0;}
.tag-live{background:rgba(239,68,68,0.2);color:#fca5a5;border:1px solid rgba(239,68,68,0.3);}
.tag-hd{background:rgba(245,197,24,0.15);color:var(--gold);border:1px solid rgba(245,197,24,0.3);}
.tag-new{background:rgba(16,185,129,0.2);color:#6ee7b7;border:1px solid rgba(16,185,129,0.3);}

/* SOCIAL */
.social-card{border-radius:16px;border:1px solid var(--border);background:var(--card);padding:16px;animation:riseIn .6s ease both;}
.social-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px;margin-bottom:3px;}
.social-desc{font-size:12px;font-family:'DM Sans',sans-serif;color:var(--muted);line-height:1.55;margin-bottom:13px;font-weight:300;}
.social-row{display:flex;gap:10px;}
.soc-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border-radius:12px;text-decoration:none;color:white;font-weight:700;font-size:14px;letter-spacing:.5px;transition:all .22s;}
.soc-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.45);}
.tg{background:linear-gradient(135deg,#0088cc,#1d4ed8);}
.ig{background:linear-gradient(135deg,#f09433,#e6683c 30%,#dc2743 55%,#cc2366 80%,#bc1888);}
.footer{text-align:center;font-size:10px;font-family:'DM Sans',sans-serif;color:rgba(128,153,196,0.4);letter-spacing:1.5px;padding-bottom:6px;}
.footer b{color:rgba(245,197,24,0.5);font-weight:500;}
@keyframes riseIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--navy);}::-webkit-scrollbar-thumb{background:var(--blue);border-radius:4px;}
</style>
</head>
<body>
<div class="seam-bar"></div>
<div class="ipl-bg">
  <div class="beam"></div><div class="beam"></div><div class="beam"></div><div class="beam"></div>

</div>

<header class="header">

  </div>

</header>

<div class="container">

  <!-- MATCH CARD — TEXT ONLY, NO LOGOS -->
  <div class="match-card">
    <div class="ipl-label">TATA IPL 2026</div>
    <div class="match-row">
      <div class="team-block">
        <div class="team-abbr" id="team1Abbr">—</div>
        <div class="team-full" id="team1Full"></div>
      </div>
      <div class="vs-block">
        <div class="vs-line"></div>
        <div class="vs-text">VS</div>
        <div class="match-status" id="matchStatus">—</div>
        <div class="vs-line"></div>
      </div>
      <div class="team-block" style="align-items:flex-end;text-align:right;">
        <div class="team-abbr" id="team2Abbr">—</div>
        <div class="team-full" id="team2Full"></div>
      </div>
    </div>
    <div class="match-venue" id="matchVenue" style="display:none;"></div>
  </div>

  <!-- PLAYER -->
  <div class="player-wrap">
    <div class="cb cb-tl"></div><div class="cb cb-tr"></div>
    <div class="cb cb-bl"></div><div class="cb cb-br"></div>
    <div class="click-overlay" id="overlay" onclick="handleClick()"></div>
    <iframe id="player" src="about:blank" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>

  <!-- CHANNEL DROPDOWN -->
  <div class="channel-panel">
    <div class="channel-header" id="chHeader" onclick="toggleDropdown()">
      <div class="ch-left">
        <div class="ch-pulsedot"></div>
        <div>
          <div class="ch-label">📡 Select Channel</div>

  <!-- SOCIAL -->
  <div class="social-card">

    <div class="social-desc">Get instant IPL updates, backup streaming links, and exclusive match content.</div>
    <div class="social-row">
      <a href="https://t.me/addlist/6qALMSdKoVVkNWI1" target="_blank" class="soc-btn tg">✈️ Telegram</a>
      <a href="https://www.instagram.com/crickcast.live" target="_blank" class="soc-btn ig">📸 Instagram</a>
    </div>
  </div>

  <div class="footer"><b>CrickCast</b> &nbsp;•&nbsp; TATA IPL 2026 &nbsp;•&nbsp; Unofficial Fan Stream</div>
</div>

<script>
const BG_COLORS=['linear-gradient(135deg,#1e40af,#2563eb)','linear-gradient(135deg,#92400e,#f59e0b)','linear-gradient(135deg,#3b0764,#7c3aed)','linear-gradient(135deg,#064e3b,#059669)','linear-gradient(135deg,#881337,#e11d48)','linear-gradient(135deg,#1e3a5f,#0ea5e9)','linear-gradient(135deg,#3f3f46,#a1a1aa)'];
const CACHE_CH  = 'cc_ch_v3';
const CACHE_MT  = 'cc_mt_v3';
const CACHE_TTL = 30 * 60 * 1000;
let activeChId  = null;

/* ── CACHE HELPERS ── */
function setCache(key,data){try{localStorage.setItem(key,JSON.stringify({data,ts:Date.now()}));}catch(e){}}
function getCache(key){
  try{
    const r=localStorage.getItem(key);if(!r)return null;
    const o=JSON.parse(r);if(Date.now()-o.ts>CACHE_TTL)return null;
    return o.data;
  }catch(e){return null;}
}

/* ── LOAD MATCH ── */
function loadMatch(){
  // Show cached immediately
  const cached=getCache(CACHE_MT);
  if(cached) renderMatch(cached);
  // Always fetch fresh from GitHub JSON
  fetch('matches.json?_='+Date.now(),{cache:'no-store'})
    .then(r=>{if(!r.ok)throw new Error();return r.json();})
    .then(data=>{setCache(CACHE_MT,data);renderMatch(data);})
    .catch(()=>{
      // fallback to Firebase REST
      fetch('https://crickcast-fd9f8-default-rtdb.firebaseio.com/match_config.json')
        .then(r=>r.json()).then(d=>{if(d)renderMatch(d);}).catch(()=>{});
    });
}

function renderMatch(m){
  document.getElementById('team1Abbr').textContent  = m.team1||'—';
  document.getElementById('team1Full').textContent  = m.team1_full||m.team1||'';
  document.getElementById('team2Abbr').textContent  = m.team2||'—';
  document.getElementById('team2Full').textContent  = m.team2_full||m.team2||'';
  document.getElementById('matchStatus').textContent = m.status||'LIVE NOW';
  const venueEl=document.getElementById('matchVenue');
  if(m.venue){venueEl.textContent=m.venue;venueEl.style.display='block';}
  else{venueEl.style.display='none';}
}

/* ── LOAD CHANNELS ── */
function loadChannels(){
  const cached=getCache(CACHE_CH);
  if(cached&&cached.length) renderChannels(cached);
  fetch('channels.json?_='+Date.now(),{cache:'no-store'})
    .then(r=>{if(!r.ok)throw new Error();return r.json();})
    .then(data=>{
      const enabled=data.filter(c=>c.enabled!==false).sort((a,b)=>(a.order||0)-(b.order||0));
      setCache(CACHE_CH,enabled);
      renderChannels(enabled);
    })
    .catch(()=>{
      // fallback Firebase REST
      fetch('https://crickcast-fd9f8-default-rtdb.firebaseio.com/channels_config.json')
        .then(r=>r.json()).then(d=>{
          if(!d)return;
          const chs=Object.values(d).filter(c=>c.enabled!==false).sort((a,b)=>(a.order||0)-(b.order||0));
          if(chs.length)renderChannels(chs);
        }).catch(()=>{});
    });
}

function renderChannels(channels){
  const body=document.getElementById('dropdownBody');
  if(!channels.length){
    body.innerHTML='<div style="padding:16px;text-align:center;color:var(--muted);font-family:\'DM Sans\',sans-serif;font-size:13px;">No channels available.</div>';
    return;
  }
  body.innerHTML=channels.map((ch,i)=>{
    const bg=BG_COLORS[i%BG_COLORS.length];
    const tc=ch.tag==='hd'?'tag-hd':ch.tag==='new'?'tag-new':'tag-live';
    const tt=ch.tag==='hd'?'HD':ch.tag==='new'?'NEW':'LIVE';
    const act=(!activeChId&&i===0)||activeChId===ch.id;
    return `<div class="ch-option${act?' active':''}" data-id="${ch.id}" data-url="${encodeURIComponent(ch.url)}" data-name="${encodeURIComponent(ch.name)}" data-desc="${encodeURIComponent(ch.desc||'')}" onclick="selectChannel(this)">
      <div class="ch-num" style="background:${bg}">${i+1}</div>
      <div class="ch-info"><div class="ch-name">${ch.name}</div><div class="ch-desc">${ch.desc||''}</div></div>
      <span class="ch-tag ${tc}">${tt}</span>
    </div>`;
  }).join('');
  // Auto-load first channel
  if(!activeChId&&channels.length){
    const first=channels[0];
    document.getElementById('player').src=first.url;
    document.getElementById('chCurrentLabel').textContent=first.name;
    activeChId=first.id;
    
  }
}

function selectChannel(el){
  const id=el.dataset.id;
  const url=decodeURIComponent(el.dataset.url);
  const name=decodeURIComponent(el.dataset.name);
  const desc=decodeURIComponent(el.dataset.desc);
  activeChId=id;
  document.querySelectorAll('.ch-option').forEach(o=>o.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('player').src=url;
  document.getElementById('chCurrentLabel').textContent=name+(desc?' — '+desc:'');
  document.getElementById('overlay').style.display='block';
  closeDropdown();
  
}

/* ── CHANNEL ANALYTICS ── */
function trackChannel(id,name){
  try{
    const TODAY=new Date().toISOString().slice(0,10).replace(/-/g,'');
    const key='ch_'+id.replace(/[^a-z0-9]/gi,'_');
    const url=`https://crickcast-fd9f8-default-rtdb.firebaseio.com/ch_analytics/${TODAY}/${key}.json`;
    fetch(url).then(r=>r.json()).then(val=>{
      const cur=(val&&val.count)?val.count:0;
      fetch(url,{method:'PUT',body:JSON.stringify({name,count:cur+1})});
    }).catch(()=>{});
  }catch(e){}
}

/* ── DROPDOWN ── */
function toggleDropdown(){
  const b=document.getElementById('dropdownBody'),a=document.getElementById('chArrow'),h=document.getElementById('chHeader');
  const o=b.classList.toggle('open');a.classList.toggle('open',o);h.classList.toggle('open',o);
}
function closeDropdown(){
  document.getElementById('dropdownBody').classList.remove('open');
  document.getElementById('chArrow').classList.remove('open');
  document.getElementById('chHeader').classList.remove('open');
}
function handleClick(){document.getElementById('overlay').style.display='none';}
document.addEventListener('click',e=>{if(!document.querySelector('.channel-panel').contains(e.target))closeDropdown();});

/* ── PARTICLES ── */
(function(){
  const wrap=document.getElementById('particles');
  const colors=['rgba(245,197,24,.55)','rgba(239,68,68,.45)','rgba(37,99,235,.45)','rgba(255,255,255,.25)'];
  for(let i=0;i<20;i++){
    const p=document.createElement('div');p.className='p';
