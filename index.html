<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IPL 2026 Live</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(180deg, #0f172a, #1e293b);
    color: white;
    min-height: 100vh;
}

/* HEADER */
.header {
    padding: 16px;
    text-align: center;
    font-weight: 700;
    font-size: 22px;
    background: linear-gradient(90deg, #1e3a8a, #2563eb);
}

/* CONTAINER */
.container {
    padding: 10px;
}

/* PLAYER */
.player-box {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
}

/* IFRAME */
.player-box iframe {
    width: 100%;
    height: 230px;
    border: none;
}

/* CLICK OVERLAY */
.click-overlay {
    position: absolute;
    inset: 0;
    z-index: 10;
    cursor: pointer;
}

/* LIVE */
.live-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #facc15;
    color: black;
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: bold;
    z-index: 11;
}

/* CHANNEL */
.channel-bar {
    margin-top: 10px;
    padding: 12px;
    border-radius: 14px;
    background: #1e293b;
}

select {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
}

/* CARD */
.card {
    margin-top: 12px;
    padding: 16px;
    border-radius: 16px;
    background: rgba(255,255,255,0.06);
}

/* SOCIAL */
.social-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
}

.btn {
    flex: 1;
    padding: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
}

.btn img {
    width: 20px;
}

/* BANNER */
.banner img {
    width: 100%;
    border-radius: 14px;
    margin-top: 12px;
}
</style>

</head>

<body>

<div class="header">🏏 TATA IPL 2026 LIVE</div>

<div class="container">

    <!-- PLAYER -->
    <div class="player-box">
        <div class="live-badge">LIVE</div>

        <!-- CLICK OVERLAY -->
        <div class="click-overlay" id="overlay" onclick="handleAdClick()"></div>

        <iframe id="player" src="https://ss1h.pages.dev/" allowfullscreen></iframe>
    </div>

    <!-- CHANNEL -->
    <div class="channel-bar">
        <select onchange="changeChannel(this.value)">
            <option value="https://ss1h.pages.dev/">Star Sports 1 Hindi HD</option>
            <option value="https://ss1e.pages.dev/">Star Sports 1 English</option>
            <option value="https://ss1-tam.pages.dev/">Star Sports Tamil</option>
            <option value="https://ss1-tel.pages.dev/">Star Sports Telugu</option>
        </select>
    </div>

    <!-- COMMUNITY -->
    <div class="card">
        <h3>🚀 Stay Connected with CrickCast</h3>

        <div class="social-row">
            <a href="https://t.me/addlist/6qALMSdKoVVkNWI1" target="_blank" class="btn">
                <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
                Telegram
            </a>

            <a href="https://www.instagram.com/crickcast.live" target="_blank" class="btn">
                <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
                Instagram
            </a>
        </div>
    </div>

    <!-- BANNER -->
    <div class="banner">
        <a href="https://wa.me/447955881183" target="_blank">
            <img src="https://github.com/Vk1817/IPL1/blob/main/offstumphd.jpg?raw=true">
        </a>
    </div>

</div>

<script>
function changeChannel(url) {
    document.getElementById("player").src = url;

    // reset overlay for new channel
    document.getElementById("overlay").style.display = "block";
}

function handleAdClick() {
    // open ad
    window.open("https://offstump.com", "_blank");

    // remove overlay so video works
    document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
