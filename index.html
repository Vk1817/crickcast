<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CRICKCAST - TATA IPL 2026</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: radial-gradient(circle at top, #1a0f2e, #05070a);
    font-family: 'Poppins', sans-serif;
    color: #fff;
}

#ad-overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 9999;
    cursor: pointer;
}

.header {
    padding: 18px;
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    color: #ff4ecd;
}

#channelDropdown {
    width: 92%;
    margin: 10px auto;
    padding: 10px;
    background: #111;
    color: white;
    border: none;
}

.player-card {
    width: 92%;
    margin: auto;
    padding: 10px;
    border-radius: 20px;
    background: linear-gradient(145deg, #2a1740, #140b24);
}

.video-container {
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: 16px;
    overflow: hidden;
    background: #000;
}

video {
    width: 100%;
    height: 100%;
}

.live-box {
    margin: 12px auto;
    width: 90px;
    text-align: center;
    padding: 6px;
    border-radius: 20px;
    border: 1px solid red;
    color: red;
}

.match-title {
    text-align: center;
    font-size: 20px;
}

.ad-box {
    width: 92%;
    margin: 20px auto;
}

.ad-box img {
    width: 100%;
}

#telegramBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 55px;
    height: 55px;
    z-index: 9999;
    border-radius: 50%;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
    animation: pulse 2s infinite;
}

#telegramBtn img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
}

@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(0,136,204, 0.7); }
    70% { box-shadow: 0 0 0 15px rgba(0,136,204, 0); }
    100% { box-shadow: 0 0 0 0 rgba(0,136,204, 0); }
}
</style>
</head>

<body>

<div id="ad-overlay" onclick="openAd()"></div>

<div class="header">TATA IPL 2026</div>

<select id="channelDropdown"></select>

<div class="player-card">
    <div class="video-container">
        <video id="videoPlayer" playsinline controls autoplay></video>
    </div>
</div>

<div class="live-box">● LIVE</div>
<div class="match-title">KKR vs MI</div>

<div class="ad-box">
    <a href="https://wa.me/447955881183" target="_blank">
        <img src="https://github.com/Vk1817/IPL1/blob/main/offstump1.png?raw=true">
    </a>
</div>

<a href="https://t.me/+BMRZLxqFMctjMjU1" target="_blank" id="telegramBtn">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
</a>

<script>
const API_URL = "https://tv.akcoder777.workers.dev";

let player;
let allChannels = [];
let currentChannel = null;

const priorityOrder = [
    "star sports 1 hindi hd",
    "star sports 2 hindi hd",
    "star sports 1hd",
    "star sports 2 hd",
    "star sports kannada",
    "star sports telugu",
    "star sports tamil"
];

async function init() {
    try {
        const res = await fetch(API_URL);
        const data = await res.json();

        allChannels = data.filter(ch =>
            ch.channel_name.toLowerCase().includes("star sports")
        );

        allChannels.sort((a, b) => {
            const aName = a.channel_name.toLowerCase();
            const bName = b.channel_name.toLowerCase();

            const aIndex = priorityOrder.findIndex(p => aName.includes(p));
            const bIndex = priorityOrder.findIndex(p => bName.includes(p));

            if (aIndex !== -1 && bIndex !== -1) return aIndex - bIndex;
            if (aIndex !== -1) return -1;
            if (bIndex !== -1) return 1;

            return aName.localeCompare(bName);
        });

        createDropdown();

        if (allChannels.length > 0) {
            loadChannel(allChannels[0]);
        }

    } catch (err) {
        alert("Channel load failed");
        console.log(err);
    }
}

function createDropdown() {
    const dropdown = document.getElementById("channelDropdown");
    dropdown.innerHTML = "";

    allChannels.forEach((ch, i) => {
        const opt = document.createElement("option");
        opt.value = i;
        opt.text = ch.channel_name;
        dropdown.appendChild(opt);
    });

    dropdown.onchange = (e) => {
        loadChannel(allChannels[e.target.value]);
    };
}

async function loadChannel(channel) {
    currentChannel = channel;

    try {
        if (player) await player.destroy();

        const video = document.getElementById("videoPlayer");

        shaka.polyfill.installAll();
        player = new shaka.Player(video);

        new shaka.ui.Overlay(player, document.querySelector(".video-container"), video);

        player.addEventListener('error', (e) => {
            console.log("SHAKA ERROR:", e.detail);
            retryStream();
        });

        player.configure({
            streaming: {
                retryParameters: { maxAttempts: 3 }
            },
            drm: {
                clearKeys: {
                    [channel.keyId]: channel.key
                }
            }
        });

        player.getNetworkingEngine().registerRequestFilter((type, request) => {

            request.headers["Referer"] = "https://www.jiotv.com/";
            request.headers["Origin"] = "https://www.jiotv.com";
            request.headers["User-Agent"] = "Mozilla/5.0";

            if (channel.cookie) {
                request.headers["Cookie"] = channel.cookie;

                const match = channel.cookie.match(/__hdnea__=([^;]+)/);

                if (match) {
                    const token = "__hdnea__=" + match[1];

                    request.uris = request.uris.map(uri => {
                        if (!uri.includes("__hdnea__")) {
                            return uri + (uri.includes("?") ? "&" : "?") + token;
                        }
                        return uri;
                    });
                }
            }
        });

        await player.load(channel.channel_url);

    } catch (err) {
        console.log("LOAD ERROR:", err);
        retryStream();
    }
}

function retryStream() {
    if (currentChannel) {
        setTimeout(() => loadChannel(currentChannel), 3000);
    }
}

function openAd() {
    window.open("https://offstump.com/", "_blank");
    document.getElementById("ad-overlay").style.display = "none";
}

window.onload = init;
</script>

</body>
</html>
