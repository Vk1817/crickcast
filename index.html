<script>
const API_URL = "https://tv.akcoder777.workers.dev";

let player;
let allChannels = [];
let currentChannel = null;

const priorityOrder = [
    "star sports 1 hindi hd",
    "star sports 2 hindi hd",
    "star sports 1hd",
    "star sports 2 hd",
    "star sports kannada",
    "star sports telugu",
    "star sports tamil"
];

async function init() {
    try {
        const res = await fetch(API_URL);
        const data = await res.json();

        allChannels = data.filter(ch =>
            ch.channel_name.toLowerCase().includes("star sports")
        );

        allChannels.sort((a, b) => {
            const aName = a.channel_name.toLowerCase();
            const bName = b.channel_name.toLowerCase();

            const aIndex = priorityOrder.findIndex(p => aName.includes(p));
            const bIndex = priorityOrder.findIndex(p => bName.includes(p));

            if (aIndex !== -1 && bIndex !== -1) return aIndex - bIndex;
            if (aIndex !== -1) return -1;
            if (bIndex !== -1) return 1;

            return aName.localeCompare(bName);
        });

        createDropdown();

        if (allChannels.length > 0) {
            loadChannel(allChannels[0]);
        }

    } catch (err) {
        console.log("API ERROR:", err);
        alert("Failed to load channels");
    }
}

function createDropdown() {
    const dropdown = document.getElementById("channelDropdown");

    dropdown.innerHTML = "";

    allChannels.forEach((ch, i) => {
        const opt = document.createElement("option");
        opt.value = i;
        opt.text = ch.channel_name;
        dropdown.appendChild(opt);
    });

    dropdown.onchange = (e) => {
        loadChannel(allChannels[e.target.value]);
    };
}

async function loadChannel(channel) {
    currentChannel = channel;

    try {
        if (player) await player.destroy();

        const video = document.getElementById("videoPlayer");

        shaka.polyfill.installAll();
        player = new shaka.Player(video);

        new shaka.ui.Overlay(player, document.querySelector(".video-container"), video);

        player.addEventListener('error', (e) => {
            console.log("SHAKA ERROR:", e.detail);
            retryStream();
        });

        player.configure({
            streaming: {
                retryParameters: {
                    maxAttempts: 3
                }
            },
            drm: {
                clearKeys: {
                    [channel.keyId]: channel.key
                }
            }
        });

        player.getNetworkingEngine().registerRequestFilter((type, request) => {

            request.headers["Referer"] = "https://www.jiotv.com/";
            request.headers["Origin"] = "https://www.jiotv.com";
            request.headers["User-Agent"] = "Mozilla/5.0";

            if (channel.cookie) {
                request.headers["Cookie"] = channel.cookie;

                const tokenMatch = channel.cookie.match(/__hdnea__=([^;]+)/);

                if (tokenMatch) {
                    const token = "__hdnea__=" + tokenMatch[1];

                    request.uris = request.uris.map(uri => {
                        if (!uri.includes("__hdnea__")) {
                            return uri + (uri.includes("?") ? "&" : "?") + token;
                        }
                        return uri;
                    });
                }
            }
        });

        await player.load(channel.channel_url);

    } catch (err) {
        console.log("LOAD ERROR:", err);
        retryStream();
    }
}

function retryStream() {
    console.log("Retrying stream...");
    if (currentChannel) {
        setTimeout(() => loadChannel(currentChannel), 3000);
    }
}

function openAd() {
    window.open("https://offstump.com/", "_blank");
    document.getElementById("ad-overlay").style.display = "none";
}

window.onload = init;
</script>
