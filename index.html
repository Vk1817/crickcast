<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IPL 2026 Live</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(180deg, #0f172a, #1e293b);
    color: white;
}

/* HEADER */
.header {
    padding: 16px;
    text-align: center;
    font-weight: 700;
    font-size: 22px;
    background: linear-gradient(90deg, #1e3a8a, #2563eb);
    box-shadow: 0 4px 20px rgba(37,99,235,0.4);
}

/* CONTAINER */
.container {
    padding: 10px;
}

/* PLAYER */
.player-box {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(37,99,235,0.3);
}

.player-box iframe {
    width: 100%;
    height: 230px;
    border: none;
}

/* LIVE */
.live-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #facc15;
    color: black;
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: bold;
}

/* CHANNEL */
.channel-bar {
    margin-top: 10px;
    padding: 12px;
    border-radius: 14px;
    background: linear-gradient(135deg, #1e293b, #0f172a);
}

select {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
}

/* CARD */
.card {
    margin-top: 12px;
    padding: 16px;
    border-radius: 16px;
    background: rgba(255,255,255,0.06);
}

/* SOCIAL */
.social-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
}

.btn {
    flex: 1;
    padding: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    font-weight: 600;
}

.btn img {
    width: 20px;
}

/* COLORS */
.telegram {
    background: linear-gradient(135deg, #229ED9, #2563eb);
}

.instagram {
    background: linear-gradient(135deg, #f09433, #dc2743);
}

/* BANNER */
.banner img {
    width: 100%;
    border-radius: 14px;
    margin-top: 12px;
}

/* POPUP */
.popup {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999;
}

.popup-box {
    background: #0f172a;
    padding: 20px;
    border-radius: 16px;
    text-align: center;
    width: 90%;
}

.popup-box h3 {
    margin-bottom: 10px;
}

.popup-btn {
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    width: 100%;
    font-weight: 600;
    cursor: pointer;
}

.join {
    background: #229ED9;
    color: white;
}

.close {
    background: #1e293b;
    color: white;
}
</style>

</head>

<body>

<div class="header">🏏 TATA IPL 2026 LIVE</div>

<div class="container">

    <!-- PLAYER -->
    <div class="player-box" onclick="handleClick()">
        <div class="live-badge">LIVE</div>
        <iframe id="player" src="https://ss1h.pages.dev/" allowfullscreen></iframe>
    </div>

    <!-- CHANNEL -->
    <div class="channel-bar">
        <select onchange="changeChannel(this.value)">
            <option value="https://ss1h.pages.dev/">Star Sports 1 Hindi HD</option>
            <option value="https://ss1e.pages.dev/">Star Sports 1 English</option>
            <option value="https://ss1-tam.pages.dev/">Star Sports Tamil</option>
            <option value="https://ss1-tel.pages.dev/">Star Sports Telugu</option>
        </select>
    </div>

    <!-- COMMUNITY -->
    <div class="card">
        <h3>🚀 Stay Connected with CrickCast</h3>
        <p>Get instant IPL updates & backup links.</p>

        <div class="social-row">
            <a href="https://t.me/addlist/6qALMSdKoVVkNWI1" target="_blank" class="btn telegram">
                <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
                Telegram
            </a>

            <a href="https://www.instagram.com/crickcast.live" target="_blank" class="btn instagram">
                <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
                Instagram
            </a>
        </div>
    </div>

    <!-- BANNER -->
    <div class="banner">
        <a href="https://wa.me/447955881183" target="_blank">
            <img src="https://github.com/Vk1817/IPL1/blob/main/offstumphd.jpg?raw=true">
        </a>
    </div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="popup-box">
        <h3>📢 Join Telegram Channels</h3>
        <p>Get live updates & backup links instantly</p>

        <button class="popup-btn join" onclick="joinTelegram()">Join Now</button>
        <button class="popup-btn close" onclick="closePopup()">Already Joined</button>
    </div>
</div>

<script>
let clicked = false;

function changeChannel(url) {
    document.getElementById("player").src = url;
}

function handleClick() {
    if (!clicked) {
        clicked = true;

        // Open ad
        window.open("https://wa.me/447955881183", "_blank");

        // Show popup after delay
        setTimeout(() => {
            document.getElementById("popup").style.display = "flex";
        }, 800);
    }
}

function joinTelegram() {
    window.open("https://t.me/addlist/6qALMSdKoVVkNWI1", "_blank");
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
