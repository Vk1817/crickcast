<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CRICKCAST - TATA IPL 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: radial-gradient(circle at top, #1a0f2e, #05070a);
    font-family: 'Poppins', sans-serif;
    color: #fff;
}

.header {
    padding: 18px;
    text-align: center;
    font-size: 24px;
    font-weight: 700;
    color: #ff4ecd;
}

.player-wrapper {
    width: 92%;
    margin: 15px auto;
    border-radius: 18px;
    overflow: hidden;
    background: linear-gradient(145deg, #2a1740, #140b24);
    box-shadow: 0 0 25px rgba(128,0,255,0.4);
}

.my-iframe {
    width: 100%;
    aspect-ratio: 16/9;
}

.my-iframe iframe {
    width: 100%;
    height: 100%;
    border: none;
}

.control-bar {
    padding: 10px;
    text-align: center;
    font-size: 15px;
}

#currentChannelName {
    font-weight: 600;
}

.live-box {
    margin: 10px auto;
    width: 100px;
    padding: 6px;
    text-align: center;
    border-radius: 20px;
    border: 1px solid red;
    color: red;
}

.selector-area {
    width: 92%;
    margin: 10px auto;
}

#channelSelector {
    width: 100%;
    padding: 10px;
    background: #111;
    color: #fff;
    border-radius: 10px;
    border: none;
}

.banner {
    width: 92%;
    margin: 15px auto;
}

.banner img {
    width: 100%;
    border-radius: 10px;
}

.telegram-toggle {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    background: #0088cc;
    display: flex;
    align-items: center;
    justify-content: center;
}
.telegram-toggle img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
}
</style>

</head>

<body>

<div class="header">TATA IPL 2026</div>

<div class="player-wrapper">
    <div class="my-iframe">
        <iframe id="videoFrame" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>

```
<div class="control-bar">
    <span id="currentChannelName">Loading...</span>
</div>
```

</div>

<div class="live-box">● LIVE</div>

<div class="selector-area">
    <select id="channelSelector" onchange="changeChannel(this.value)"></select>
</div>

<div class="banner">
    <a href="https://wa.me/447955881183" target="_blank">
        <img src="https://github.com/Vk1817/IPL1/blob/main/offstumphd.jpg?raw=true">
    </a>
</div>

<a href="https://t.me/vaathala1" target="_blank" class="telegram-toggle">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
</a>

<script>
const iframe = document.getElementById("videoFrame");
const selector = document.getElementById("channelSelector");
const nameDisplay = document.getElementById("currentChannelName");

let allChannels = [];

async function loadChannels() {
    try {
        const res = await fetch("https://raw.githubusercontent.com/vaathala00/jow/main/output.json");
        const data = await res.json();

        const sports = data.filter(c => c.group && c.group.toLowerCase().includes("sports"));

        const orderList = [
            ["star","sports","1","hindi","hd"],
            ["star","sports","2","hindi","hd"],
            ["star","sports","1"],
            ["star","sports","2"],
            ["star","sports","tamil"],
            ["star","sports","telugu"],
            ["star","sports","kannada"],
            ["star","sports","3"],
            ["sony","ten","1"],
            ["sony","ten","2"],
            ["sony","ten","3"],
            ["sony","ten","4"],
            ["sony","ten","5"],
            ["sony","liv","1"],
            ["sony","liv","2"],
            ["sony","liv","3"],
            ["sony","liv","4"],
            ["sony","liv","5"]
        ];

        let used = new Set();
        allChannels = [];

        orderList.forEach(keys => {
            const found = sports.find(c => {
                const name = c.name.toLowerCase();
                return keys.every(k => name.includes(k)) && !used.has(c.id);
            });

            if (found) {
                allChannels.push(found);
                used.add(found.id);
            }
        });

        const remaining = sports.filter(c => !used.has(c.id));
        allChannels = [...allChannels, ...remaining];

        selector.innerHTML = "";
        allChannels.forEach(ch => {
            const opt = document.createElement("option");
            opt.value = ch.id;
            opt.textContent = ch.name;
            selector.appendChild(opt);
        });

        if (allChannels.length > 0) {
            loadChannel(allChannels[0].id);
        }

    } catch (e) {
        console.error("Channel load failed:", e);
    }
}

function loadChannel(id) {
    const ch = allChannels.find(c => String(c.id) === String(id));

    if (ch) {
        iframe.src = ch.link;
        nameDisplay.textContent = ch.name;
        document.title = ch.name + " - Live";
    }
}

function changeChannel(id) {
    loadChannel(id);
}

window.onload = loadChannels;

// 🔥 AD CLICK (ONLY ONCE)
let adShown = false;
const playerWrapper = document.querySelector(".player-wrapper");

playerWrapper.addEventListener("click", () => {
    if (!adShown) {
        adShown = true;
        window.open("https://offstump.com", "_blank");
    }
});
</script>

</body>
</html>
