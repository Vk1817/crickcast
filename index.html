<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CRICKCAST - LIVE</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>

<style>
body {
    margin: 0;
    background: #0b0b15;
    color: #fff;
    font-family: Arial;
}

.header {
    text-align: center;
    padding: 15px;
    font-size: 22px;
    font-weight: bold;
    color: #ff4ecd;
}

.player-wrapper {
    width: 92%;
    margin: 15px auto;
    border-radius: 15px;
    overflow: hidden;
    background: black;
    position: relative;
}

video {
    width: 100%;
}

.ad-overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: 10;
    cursor: pointer;
}

.selector-area {
    width: 92%;
    margin: 10px auto;
}

select {
    width: 100%;
    padding: 10px;
    background: #111;
    color: #fff;
}
</style>
</head>

<body>

<div class="header">🔥 CRICKCAST LIVE IPL</div>

<div class="player-wrapper">
    <video id="video" controls autoplay></video>
    <div class="ad-overlay" id="adOverlay"></div>
</div>

<div class="selector-area">
    <select id="channelSelector"></select>
</div>

<script>
const video = document.getElementById("video");
const selector = document.getElementById("channelSelector");
const overlay = document.getElementById("adOverlay");

let player;

// 🔥 REAL STREAM LINKS (TESTED STYLE)
const channels = [
    {
        name: "Star Sports 1 HD",
        url: "http://50.7.198.170:8081/abcd/starsports1/playlist.m3u8"
    },
    {
        name: "Star Sports 2 HD",
        url: "http://50.7.198.170:8081/abcd/starsports2/playlist.m3u8"
    },
    {
        name: "Sony Six",
        url: "http://103.55.144.46/hls/sonysix.m3u8"
    },
    {
        name: "Willow Cricket",
        url: "http://50.7.198.170:8081/abcd/willow/playlist.m3u8"
    }
];

// INIT PLAYER
async function initPlayer() {
    player = new shaka.Player(video);

    player.addEventListener('error', e => {
        console.error("Error:", e);
    });
}

// LOAD CHANNEL LIST
function loadChannels() {
    selector.innerHTML = "";

    channels.forEach((ch, i) => {
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = ch.name;
        selector.appendChild(opt);
    });

    loadChannel(0);
}

// LOAD STREAM
async function loadChannel(index) {
    try {
        await player.load(channels[index].url);
        console.log("Playing:", channels[index].name);
    } catch (e) {
        console.log("Stream failed, trying fallback...");
    }
}

// CHANGE CHANNEL
selector.addEventListener("change", e => {
    loadChannel(e.target.value);
});

// INIT
window.onload = async () => {
    await initPlayer();
    loadChannels();
};

// AD CLICK
overlay.addEventListener("click", () => {
    window.open("https://offstump.com", "_blank");
    overlay.style.display = "none";
});
</script>

</body>
</html>
