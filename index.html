<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TATA IPL 2026 Live</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: #020617;
    color: white;
}

/* Header */
.header {
    text-align: center;
    padding: 16px;
    font-size: 22px;
    font-weight: 600;
    background: linear-gradient(90deg, #1e3a8a, #2563eb);
}

/* Player */
.container {
    padding: 12px;
}

.player-wrapper {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0,0,0,0.6);
}

iframe {
    width: 100%;
    height: 220px;
    border: none;
}

/* Channel Selector */
.selector {
    margin-top: 12px;
}

select {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #0f172a;
    color: white;
    font-size: 15px;
}

/* Card */
.card {
    margin-top: 15px;
    padding: 18px;
    border-radius: 14px;
    background: #0f172a;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

.card h3 {
    margin-bottom: 8px;
}

/* Social Row */
.social-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
}

.btn {
    flex: 1;
    text-align: center;
    padding: 12px;
    border-radius: 10px;
    text-decoration: none;
    color: white;
    font-weight: 500;
}

.telegram {
    background: #229ED9;
}

.instagram {
    background: linear-gradient(45deg, #f09433, #e6683c, #dc2743);
}

/* Banner */
.banner img {
    width: 100%;
    border-radius: 12px;
    margin-top: 15px;
}
</style>

</head>

<body>

<div class="header">🏏 TATA IPL 2026 LIVE</div>

<div class="container">

    <!-- PLAYER -->
    <div class="player-wrapper">
        <iframe id="player" src="https://ss1h.pages.dev/" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <!-- CHANNEL SELECT -->
    <div class="selector">
        <select onchange="changeChannel(this.value)">
            <option value="https://ss1h.pages.dev/">Star Sports 1 Hindi HD</option>
            <option value="https://ss1e.pages.dev/">Star Sports 1 English</option>
            <option value="https://ss1-tam.pages.dev/">Star Sports Tamil</option>
            <option value="https://ss1-tel.pages.dev/">Star Sports Telugu</option>
        </select>
    </div>

    <!-- COMMUNITY -->
    <div class="card">
        <h3>🚀 Stay Connected</h3>
        <p>
            Join our official community for instant match updates, backup streaming links,
            and exclusive cricket content. Never miss a moment of IPL action.
        </p>

        <div class="social-row">
            <a href="https://t.me/addlist/6qALMSdKoVVkNWI1" target="_blank" class="btn telegram">
                📢 Telegram
            </a>

            <a href="https://www.instagram.com/crickcast.live" target="_blank" class="btn instagram">
                📸 Instagram
            </a>
        </div>
    </div>

    <!-- BANNER -->
    <div class="banner">
        <a href="https://wa.me/447955881183" target="_blank">
            <img src="https://github.com/Vk1817/IPL1/blob/main/offstumphd.jpg?raw=true">
        </a>
    </div>

</div>

<script>
function changeChannel(url) {
    document.getElementById("player").src = url;
}
</script>

</body>
</html>
