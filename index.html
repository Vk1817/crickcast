<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CRICKCAST - TATA IPL 2026</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: radial-gradient(circle at top, #1a0f2e, #05070a);
    font-family: 'Poppins', sans-serif;
    color: #fff;
}

.header {
    padding: 18px;
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    color: #ff4ecd;
}

#channelDropdown {
    width: 92%;
    margin: 10px auto;
    padding: 10px;
    background: #111;
    color: white;
    border: none;
}

.player-card {
    width: 92%;
    margin: auto;
    padding: 10px;
    border-radius: 20px;
    background: linear-gradient(145deg, #2a1740, #140b24);
}

.video-container {
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: 16px;
    overflow: hidden;
    background: #000;
}

video {
    width: 100%;
    height: 100%;
}

.live-box {
    margin: 12px auto;
    width: 90px;
    text-align: center;
    padding: 6px;
    border-radius: 20px;
    border: 1px solid red;
    color: red;
}

.match-title {
    text-align: center;
    font-size: 20px;
}

#telegramBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
    animation: pulse 2s infinite;
}

#telegramBtn img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
}

@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(0,136,204, 0.7); }
    70% { box-shadow: 0 0 0 15px rgba(0,136,204, 0); }
    100% { box-shadow: 0 0 0 0 rgba(0,136,204, 0); }
}
</style>
</head>

<body>

<div class="header">TATA IPL 2026</div>

<select id="channelDropdown"></select>

<div class="player-card">
    <div class="video-container">
        <video id="videoPlayer" playsinline controls autoplay></video>
    </div>
</div>

<div class="live-box">● LIVE</div>
<div class="match-title">SPORTS LIVE</div>

<a href="https://t.me/+BMRZLxqFMctjMjU1" target="_blank" id="telegramBtn">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
</a>

<script>
const API_URL = "https://raw.githubusercontent.com/vaathala00/jow/main/output.json";

let player;
let allChannels = [];
let currentChannel = null;

async function init() {
    try {
        const res = await fetch(API_URL);
        const data = await res.json();

        // ONLY SPORTS CHANNELS + DIRECT LINK
        allChannels = data
            .filter(ch => ch.group && ch.group.toLowerCase().includes("sports"))
            .map(ch => ({
                channel_name: ch.name,
                channel_url: ch.link   // IMPORTANT FIX
            }));

        createDropdown();

        if (allChannels.length > 0) {
            loadChannel(allChannels[0]);
        }

    } catch (err) {
        alert("Channel load failed");
        console.log(err);
    }
}

function createDropdown() {
    const dropdown = document.getElementById("channelDropdown");
    dropdown.innerHTML = "";

    allChannels.forEach((ch, i) => {
        const opt = document.createElement("option");
        opt.value = i;
        opt.text = ch.channel_name;
        dropdown.appendChild(opt);
    });

    dropdown.onchange = (e) => {
        loadChannel(allChannels[e.target.value]);
    };
}

async function loadChannel(channel) {
    currentChannel = channel;

    try {
        if (player) await player.destroy();

        const video = document.getElementById("videoPlayer");

        shaka.polyfill.installAll();
        player = new shaka.Player(video);

        new shaka.ui.Overlay(player, document.querySelector(".video-container"), video);

        player.addEventListener('error', (e) => {
            console.log("SHAKA ERROR:", e.detail);
        });

        // STRONG CONFIG
        player.configure({
            streaming: {
                bufferingGoal: 30,
                rebufferingGoal: 5,
                retryParameters: {
                    maxAttempts: 5,
                    baseDelay: 1000,
                    backoffFactor: 2
                }
            }
        });

        // HEADERS FIX
        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            request.headers["Referer"] = "https://www.jiotv.com/";
            request.headers["Origin"] = "https://www.jiotv.com";
            request.headers["User-Agent"] =
                "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36";
        });

        await player.load(channel.channel_url);

    } catch (err) {
        console.log("LOAD ERROR:", err);
    }
}

window.onload = init;
</script>

</body>
</html>
