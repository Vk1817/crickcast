<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TATA IPL 2026 Live</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: radial-gradient(circle at top, #140a2e, #020617);
    color: white;
}

/* HEADER */
.header {
    padding: 16px;
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(90deg, #6d28d9, #9333ea);
    box-shadow: 0 4px 25px rgba(147,51,234,0.6);
}

/* PLAYER BOX */
.container {
    padding: 10px;
}

.player-box {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
}

/* GLOW BORDER ANIMATION */
.player-box::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 18px;
    background: linear-gradient(270deg, #9333ea, #6d28d9, #9333ea);
    background-size: 600% 600%;
    animation: glow 6s ease infinite;
    z-index: -1;
}

@keyframes glow {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

iframe {
    width: 100%;
    height: 230px;
    border: none;
}

/* LIVE BADGE */
.live {
    position: absolute;
    top: 10px;
    left: 10px;
    background: red;
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: bold;
}

/* CHANNEL */
.channel-bar {
    margin-top: 12px;
}

select {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.08);
    color: white;
}

/* CARD */
.card {
    margin-top: 12px;
    padding: 16px;
    border-radius: 16px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
}

/* SOCIAL */
.row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
}

.btn {
    flex: 1;
    padding: 13px;
    text-align: center;
    border-radius: 12px;
    color: white;
    text-decoration: none;
    font-weight: 600;
}

/* COLORS */
.telegram {
    background: linear-gradient(135deg, #2563eb, #9333ea);
}

.instagram {
    background: linear-gradient(135deg, #ff0066, #9333ea);
}

/* BANNER */
.banner img {
    width: 100%;
    border-radius: 14px;
    margin-top: 14px;
}
</style>
</head>

<body>

<div class="header">🏏 TATA IPL 2026 LIVE</div>

<div class="container">

    <!-- PLAYER -->
    <div class="player-box" onclick="playWithAd()">
        <div class="live">🔴 LIVE</div>
        <iframe id="player" src="" allowfullscreen></iframe>
    </div>

    <!-- CHANNEL -->
    <div class="channel-bar">
        <select onchange="changeChannel(this.value)">
            <option value="https://ss1h.pages.dev/">Star Sports 1 Hindi HD</option>
            <option value="https://ss1e.pages.dev/">Star Sports 1 English</option>
            <option value="https://ss1-tam.pages.dev/">Star Sports Tamil</option>
            <option value="https://ss1-tel.pages.dev/">Star Sports Telugu</option>
        </select>
    </div>

    <!-- COMMUNITY -->
    <div class="card">
        <h3>🚀 Stay Connected</h3>
        <p>Join our community for live updates, backup links & exclusive IPL content.</p>

        <div class="row">
            <a href="https://t.me/addlist/6qALMSdKoVVkNWI1" target="_blank" class="btn telegram">📢 Telegram</a>
            <a href="https://www.instagram.com/crickcast.live" target="_blank" class="btn instagram">📸 Instagram</a>
        </div>
    </div>

    <!-- BANNER -->
    <div class="banner">
        <a href="https://wa.me/447955881183" target="_blank">
            <img src="https://github.com/Vk1817/IPL1/blob/main/offstumphd.jpg?raw=true">
        </a>
    </div>

</div>

<script>
let currentChannel = "https://ss1h.pages.dev/";
let adShown = false;

function changeChannel(url) {
    currentChannel = url;
    document.getElementById("player").src = url;
}

function playWithAd() {
    if (!adShown) {
        adShown = true;
        window.open("https://wa.me/447955881183", "_blank");
        setTimeout(() => {
            document.getElementById("player").src = currentChannel;
        }, 500);
    } else {
        document.getElementById("player").src = currentChannel;
    }
}
</script>

</body>
</html>
