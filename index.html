<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IPL 2026 Live</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: radial-gradient(circle at top, #0b1220, #020617);
    color: white;
}

/* HEADER */
.header {
    padding: 16px;
    text-align: center;
    font-weight: 700;
    font-size: 22px;
    background: linear-gradient(90deg, #1e3a8a, #2563eb);
    letter-spacing: 1px;
    box-shadow: 0 4px 20px rgba(37,99,235,0.5);
}

/* MAIN */
.container {
    padding: 10px;
}

/* PLAYER */
.player-box {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(37,99,235,0.4);
}

.player-box iframe {
    width: 100%;
    height: 230px;
    border: none;
}

/* LIVE BADGE */
.live-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: red;
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: bold;
}

/* CHANNEL BAR */
.channel-bar {
    margin-top: 10px;
    padding: 12px;
    border-radius: 14px;
    background: linear-gradient(135deg, #020617, #0f172a);
    box-shadow: inset 0 0 10px rgba(255,255,255,0.05);
}

select {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.08);
    color: white;
    font-size: 15px;
}

/* CARD */
.card {
    margin-top: 12px;
    padding: 16px;
    border-radius: 16px;
    background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
    backdrop-filter: blur(12px);
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

/* TEXT */
.card h3 {
    font-size: 18px;
    margin-bottom: 6px;
}

.card p {
    font-size: 14px;
    opacity: 0.85;
}

/* BUTTONS */
.social-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
}

.btn {
    flex: 1;
    padding: 13px;
    text-align: center;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    font-weight: 600;
    transition: 0.3s;
}

/* BUTTON COLORS */
.telegram {
    background: linear-gradient(135deg, #229ED9, #2563eb);
}

.instagram {
    background: linear-gradient(135deg, #ff7a18, #ff0066);
}

.btn:hover {
    transform: scale(1.05);
}

/* BANNER */
.banner {
    margin-top: 12px;
}

.banner img {
    width: 100%;
    border-radius: 14px;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

/* FOOTER SPACE FIX */
.footer-space {
    height: 10px;
}
</style>

</head>

<body>

<div class="header">🏏 TATA IPL 2026 LIVE</div>

<div class="container">

    <!-- PLAYER -->
    <div class="player-box">
        <div class="live-badge">🔴 LIVE</div>
        <iframe id="player" src="https://ss1h.pages.dev/" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <!-- CHANNEL SELECT -->
    <div class="channel-bar">
        <select onchange="changeChannel(this.value)">
            <option value="https://ss1h.pages.dev/">Star Sports 1 Hindi HD</option>
            <option value="https://ss1e.pages.dev/">Star Sports 1 English</option>
            <option value="https://ss1-tam.pages.dev/">Star Sports Tamil</option>
            <option value="https://ss1-tel.pages.dev/">Star Sports Telugu</option>
        </select>
    </div>

    <!-- COMMUNITY -->
    <div class="card">
        <h3>🚀 Stay Connected with CrickCast</h3>
        <p>
            Get instant IPL updates, backup streaming links, and exclusive match content.
            Join our growing cricket community and never miss a live moment.
        </p>

        <div class="social-row">
            <a href="https://t.me/addlist/6qALMSdKoVVkNWI1" target="_blank" class="btn telegram">
                📢 Telegram
            </a>

            <a href="https://www.instagram.com/crickcast.live" target="_blank" class="btn instagram">
                📸 Instagram
            </a>
        </div>
    </div>

    <!-- BANNER -->
    <div class="banner">
        <a href="https://wa.me/447955881183" target="_blank">
            <img src="https://github.com/Vk1817/IPL1/blob/main/offstumphd.jpg?raw=true">
        </a>
    </div>

    <div class="footer-space"></div>

</div>

<script>
function changeChannel(url) {
    document.getElementById("player").src = url;
}
</script>

</body>
</html>
