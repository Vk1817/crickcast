<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IPL 2026 Live</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* FULL HEIGHT FIX */
body {
    background: linear-gradient(180deg, #0f172a, #1e293b);
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* HEADER */
.header {
    padding: 16px;
    text-align: center;
    font-weight: 700;
    font-size: 22px;
    background: linear-gradient(90deg, #1e3a8a, #2563eb);
    box-shadow: 0 4px 20px rgba(37,99,235,0.4);
}

/* MAIN */
.container {
    padding: 10px;
    flex: 1; /* 👈 fills remaining space */
}

/* PLAYER */
.player-box {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(37,99,235,0.3);
}

.player-box iframe {
    width: 100%;
    height: 230px;
    border: none;
}

/* LIVE BADGE */
.live-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #facc15;
    color: black;
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: bold;
}

/* CHANNEL BAR */
.channel-bar {
    margin-top: 10px;
    padding: 12px;
    border-radius: 14px;
    background: linear-gradient(135deg, #1e293b, #0f172a);
}

select {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
}

/* CARD */
.card {
    margin-top: 12px;
    padding: 16px;
    border-radius: 16px;
    background: rgba(255,255,255,0.06);
}

/* SOCIAL */
.social-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
}

.btn {
    flex: 1;
    padding: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    font-weight: 600;
}

.btn img {
    width: 20px;
}

/* COLORS */
.telegram {
    background: linear-gradient(135deg, #229ED9, #2563eb);
}

.instagram {
    background: linear-gradient(135deg, #f09433, #dc2743);
}

/* BANNER */
.banner img {
    width: 100%;
    border-radius: 14px;
    margin-top: 12px;
}
</style>

</head>

<body>

<div class="header">🏏 TATA IPL 2026 LIVE</div>

<div class="container">

    <!-- PLAYER -->
    <div class="player-box" onclick="handleFirstClick()">
        <div class="live-badge">LIVE</div>
        <iframe id="player" src="https://ss1h.pages.dev/" allowfullscreen></iframe>
    </div>

    <!-- CHANNEL -->
    <div class="channel-bar">
        <select onchange="changeChannel(this.value)">
            <option value="https://ss1h.pages.dev/">Star Sports 1 Hindi HD</option>
            <option value="https://ss1e.pages.dev/">Star Sports 1 English</option>
            <option value="https://ss1-tam.pages.dev/">Star Sports Tamil</option>
            <option value="https://ss1-tel.pages.dev/">Star Sports Telugu</option>
        </select>
    </div>

    <!-- COMMUNITY -->
    <div class="card">
        <h3>🚀 Stay Connected with CrickCast</h3>
        <p>Get instant IPL updates, backup streaming links, and exclusive match content.</p>

        <div class="social-row">
            <a href="https://t.me/addlist/6qALMSdKoVVkNWI1" target="_blank" class="btn telegram">
                <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
                Telegram
            </a>

            <a href="https://www.instagram.com/crickcast.live" target="_blank" class="btn instagram">
                <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
                Instagram
            </a>
        </div>
    </div>

    <!-- BANNER -->
    <div class="banner">
        <a href="https://wa.me/447955881183" target="_blank">
            <img src="https://github.com/Vk1817/IPL1/blob/main/offstumphd.jpg?raw=true">
        </a>
    </div>

</div>

<script>
let adOpened = false;

function changeChannel(url) {
    document.getElementById("player").src = url;
}

function handleFirstClick() {
    if (!adOpened) {
        adOpened = true;
        window.open("https://offstump.com", "_blank");
    }
}
</script>

</body>
</html>
