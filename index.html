<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CRICKCAST - TATA IPL 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: radial-gradient(circle at top, #1a0f2e, #05070a);
    font-family: 'Poppins', sans-serif;
    color: #fff;
}

/* HEADER */
.header {
    padding: 18px;
    text-align: center;
    font-size: 24px;
    font-weight: 700;
    background: linear-gradient(90deg,#ff4ecd,#00eaff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* PLAYER CARD */
.player-card {
    width: 92%;
    margin: 15px auto;
    padding: 12px;
    border-radius: 20px;
    background: linear-gradient(145deg, #2a1740, #140b24);
    box-shadow: 0 0 25px rgba(255, 0, 200, 0.15);
}

/* VIDEO */
.video-container {
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: 16px;
    overflow: hidden;
    background: #000;
}

.video-container iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* CONTROL BAR */
.control-bar {
    margin-top: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* CHANNEL NAME */
.match-title {
    font-size: 16px;
    font-weight: 600;
}

/* LIVE */
.live-box {
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid red;
    color: red;
    font-size: 12px;
}

/* DROPDOWN */
#channelDropdown {
    width: 92%;
    margin: 10px auto;
    padding: 12px;
    background: #0d1117;
    color: white;
    border: 1px solid #30363d;
    border-radius: 12px;
    font-size: 14px;
}

/* TELEGRAM */
#telegramBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    animation: pulse 2s infinite;
}

#telegramBtn img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
}

@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(0,136,204, 0.7); }
    70% { box-shadow: 0 0 0 15px rgba(0,136,204, 0); }
    100% { box-shadow: 0 0 0 0 rgba(0,136,204, 0); }
}

/* MOBILE */
@media(max-width:600px){
    .header { font-size: 20px; }
}
</style>
</head>

<body>

<div class="header">🏏 CRICKCAST IPL 2026</div>

<div class="player-card">
    <div class="video-container">
        <iframe id="videoFrame" allowfullscreen allow="autoplay"></iframe>
    </div>

    <div class="control-bar">
        <div class="match-title" id="matchTitle">Loading...</div>
        <div class="live-box">● LIVE</div>
    </div>
</div>

<select id="channelDropdown"></select>

<a href="https://t.me/+BMRZLxqFMctjMjU1" target="_blank" id="telegramBtn">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
</a>

<script>
const API = "https://raw.githubusercontent.com/vaathala00/jow/main/output.json";

let channels = [];

async function init() {
    try {
        const res = await fetch(API);
        const data = await res.json();

        channels = data.filter(ch =>
            ch.group && ch.group.toLowerCase().includes("sports")
        );

        const dropdown = document.getElementById("channelDropdown");

        channels.forEach((ch, i) => {
            const opt = document.createElement("option");
            opt.value = i;
            opt.textContent = ch.name;
            dropdown.appendChild(opt);
        });

        dropdown.onchange = (e) => {
            loadChannel(e.target.value);
        };

        loadChannel(0);

    } catch (err) {
        alert("Error loading channels");
        console.log(err);
    }
}

function loadChannel(index) {
    const ch = channels[index];
    const frame = document.getElementById("videoFrame");

    // ✅ YOUR ORIGINAL WORKING SYSTEM (UNCHANGED)
    frame.src = ch.link;

    document.getElementById("matchTitle").innerText = ch.name;
    document.title = ch.name + " - Live";
}

window.onload = init;
</script>

</body>
</html>
