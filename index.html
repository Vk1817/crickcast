<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(180deg, #0f172a, #1e293b);
    color: white;
}

.header {
    padding: 16px;
    text-align: center;
    font-weight: 700;
    font-size: 22px;
    background: linear-gradient(90deg, #1e3a8a, #2563eb);
    letter-spacing: 1px;
    box-shadow: 0 4px 20px rgba(37,99,235,0.4);
}

.container {
    padding: 10px;
}

.player-box {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(37,99,235,0.3);
}

.player-box iframe {
    width: 100%;
    height: 230px;
    border: none;
}

.click-overlay {
    position: absolute;
    inset: 0;
    z-index: 5;
    background: transparent;
}

.live-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #facc15;

    font-size: 12px;

}

.channel-bar {

}

select {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 15px;
}

.card {
    margin-top: 12px;
    padding: 16px;
    border-radius: 16px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
}

.card h3 {
    font-size: 18px;
    margin-bottom: 6px;
}

.card p {
    font-size: 14px;
    opacity: 0.85;
}

.social-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
}

.btn {
    flex: 1;
    padding: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    font-weight: 600;
    transition: 0.3s;
}

.btn img {
    width: 20px;
    height: 20px;
}

.telegram {
    background: linear-gradient(135deg, #229ED9, #2563eb);
}

.instagram {
    background: linear-gradient(135deg, #f09433, #dc2743);
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 12px rgba(255,255,255,0.2);
}

.footer-space {

<body>

<div class="header">🏏 TATA IPL 2026 LIVE</div>

<div class="container">

    <div class="player-box">
        <div class="live-badge">LIVE</div>

        <div class="click-overlay" id="overlay" onclick="handleAdClick()"></div>

        <iframe id="player" src="https://ss1h.pages.dev/" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <div class="channel-bar">
        <select onchange="changeChannel(this.value)">
            <option value="https://ss1h.pages.dev/">Star Sports 1 Hindi HD</option>
            <option value="https://hstar-ios.pages.dev/">Hotstar(ios& Windows)</option>
                       
            <option value="https://elizabeth-improve-sophisticated-field.trycloudflare.com/live_stream.m3u8">Willow English</option>

        </select>
    </div>

    <!-- Social section kept (no ad redirects now) -->
    <div class="card">
        <h3>🚀 Stay Connected with CrickCast</h3>
        <p>
            Get instant IPL updates, backup streaming links, and exclusive match content.
        </p>

        <div class="social-row">
            <a href="https://t.me/addlist/6qALMSdKoVVkNWI1" target="_blank" class="btn telegram">
                Telegram
            </a>

            <a href="https://www.instagram.com/crickcast.live" target="_blank" class="btn instagram">
                Instagram
            </a>
        </div>
    </div>

    <div class="footer-space"></div>

</div>

<script>
let adShown = false;

function changeChannel(url) {
    document.getElementById("player").src = url;

    // reset ad for new channel
    adShown = false;
    document.getElementById("overlay").style.display = "block";
}

function handleAdClick() {
    if (adShown) return;

    // 🔥 MONETAG AD SCRIPT TRIGGER
    // Loads ad ONLY on first click (best UX + high earnings)
    let script = document.createElement("script");
    script.src = "https://quge5.com/88/tag.min.js";
    script.setAttribute("data-zone", "227716"); // your ad zone ID
    script.async = true;
    script.setAttribute("data-cfasync", "false");

    document.body.appendChild(script);

    adShown = true;

    // allow user to watch after click
    document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
